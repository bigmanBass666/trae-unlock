rules:
  - id: "rule-001"
    name: "新会话开始前必读 Anchor 共享知识库"
    category: core
    priority: high
    enabled: true
    description: "在开始任何工作之前，必须先通过 Anchor 系统获取项目上下文和当前状态"
    actions:
      - "读取 shared/_registry.md 了解所有可用模块"
      - "按 P0 → P1 → P2 优先级读取所需模块"
      - "P0 必读: shared/context.md（项目核心上下文）"
      - "P1 推荐: shared/status.md（当前状态和待办）"
      - "禁止在不了解项目背景的情况下直接开始修改代码"
    enforcement: mandatory

  - id: "rule-002"
    name: "操作后写入 Anchor 共享模块"
    category: core
    priority: high
    enabled: true
    description: "每次完成关键操作后，必须将信息持久化到 Anchor shared/ 对应模块"
    actions:
      - "发现关键代码/架构 → 写入 shared/discoveries.md"
      - "做出技术决策 → 写入 shared/decisions.md"
      - "完成工作后 → 更新 shared/status.md"
      - "项目重大变更 → 更新 shared/context.md"
      - "会话结束前 → 在 status.md 会话日志区域追加本次会话日志（操作/观察/问题/建议）"
    enforcement: mandatory

  - id: "rule-003"
    name: "新发现必须写入 discoveries 模块"
    category: core
    priority: high
    enabled: true
    description: "发现新东西时第一时间写入 shared/discoveries.md，避免后续 AI 重复探索"
    actions:
      - "记录关键位置（文件名 + 偏移量 + 作用）"
      - "记录模块之间的关系和调用链"
      - "记录枚举值、设置 ID 等元数据"
      - "记录排除的错误方向（哪些路走不通）"
    enforcement: mandatory

  - id: "rule-004"
    name: "写入格式遵循注册表约定"
    category: core
    priority: high
    enabled: true
    description: "向 shared/ 模块追加条目时，使用 shared/_registry.md 中定义的统一格式"
    actions:
      - "格式: ### [YYYY-MM-DD HH:mm] 简短标题"
      - "使用 **关键字**: 值 的结构化内容"
      - "条目之间用 --- 分隔"
      - "详见 shared/_registry.md 的'写入格式约定'章节"
    enforcement: mandatory
