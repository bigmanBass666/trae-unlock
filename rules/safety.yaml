rules:
  - id: "rule-012"
    name: "代码修改安全原则"
    category: safety
    priority: high
    enabled: true
    description: "遵循安全最佳实践，确保代码修改不会引入安全风险或泄露敏感信息"
    actions:
      - "始终遵循安全最佳实践进行代码开发"
      - "绝不引入会泄露密钥或密钥的代码"
      - "绝不将 secrets 或 keys 提交到仓库中"
      - "在修改任何文件前先理解其上下文和现有模式"
    enforcement: mandatory

  - id: "rule-013"
    name: "Git 仓库完整性保护"
    category: safety
    priority: high
    enabled: true
    description: "保护本地 Git 仓库免受损坏，防止版本历史丢失"
    actions:
      - "认识到本地 Git 仓库可能在 merge/rebase 操作中损坏（.git 目录消失）"
      - "理解已有教训：merge 失败导致 .git 损坏 → 所有 commit 历史丢失"
      - "通过强制 push 规则确保每次提交都立即备份到远程"
      - "避免执行可能导致 .git 损坏的高风险操作（如 git merge）"
    enforcement: mandatory

  - id: "rule-014"
    name: "知识共享与防重复工作"
    category: safety
    priority: medium
    enabled: true
    description: "通过及时文档更新避免团队重复探索，保护项目知识资产不丢失"
    actions:
      - "遵循'不要让后面的 AI 重复你已经做过的探索工作'原则"
      - "新发现第一时间写入共享文档，不要延迟或遗漏"
      - "记录排除的错误方向，帮助后续 AI 避免走弯路"
      - "保持 progress.txt 实时更新，方便快速了解项目状态"
    enforcement: recommended

  - id: "rule-015"
    name: "项目背景认知要求"
    category: safety
    priority: medium
    enabled: true
    description: "在缺乏项目背景的情况下直接修改代码可能引入错误和风险"
    actions:
      - "禁止在不了解项目背景的情况下直接开始修改代码"
      - "修改前必须阅读核心文档（README.md、source-architecture.md、progress.txt）"
      - "理解现有架构和代码约定后再进行修改"
      - "遵循项目的框架选择、命名规范和编码风格"
    enforcement: mandatory
