rules:
  - id: "rule-008"
    name: "Git 提交信息格式规范"
    category: git
    priority: high
    enabled: true
    description: "使用标准化的提交信息格式，确保提交历史清晰可追溯"
    actions:
      - "使用 git add . 暂存所有更改"
      - "使用 git commit -m \"[类型] 简要说明\" 格式提交"
      - "提交类型包括：[发现] 找到 xxx 在 yyy:zzzz"
      - "[功能] 实现了 xxx"
      - "[修复] 解决了 xxx 问题"
      - "[文档] 更新了 xxx"
      - "[测试] 验证了 xxx"
    enforcement: mandatory

  - id: "rule-009"
    name: "强制 Push 规则"
    category: git
    priority: high
    enabled: true
    description: "每次 commit 后必须立即 push 到 GitHub，防止本地 .git 目录损坏导致历史丢失"
    actions:
      - "每次执行 git commit 后立即执行 git push"
      - "不要等到最后一起 push，必须逐次推送"
      - "禁止在没有 push 的情况下继续其他操作（如 git merge）"
      - "禁止使用 git add . && git commit 的链式操作而不包含 git push"
    enforcement: mandatory

  - id: "rule-010"
    name: "Git 操作风险控制"
    category: git
    priority: medium
    enabled: true
    description: "避免可能导致本地 Git 仓库损坏的危险操作，保护版本历史完整性"
    actions:
      - "避免使用 git merge 操作（可能损坏本地 .git 目录）"
      - "如果必须合并，先确保已 push 所有本地提交到远程"
      - "定期检查 .git 目录完整性"
      - "重要修改完成后立即备份到远程仓库"
    enforcement: recommended

  - id: "rule-011"
    name: "正确 Git 操作流程示例"
    category: git
    priority: medium
    enabled: true
    description: "展示正确的 Git 操作顺序和常见错误模式"
    actions:
      - "正确流程：git add . → git commit -m \"...\" → git push（立即执行）"
      - "错误流程1：git add . && git commit -m \"...\"（缺少 push）"
      - "错误流程2：在未 push 的情况下执行 git merge ...（风险高）"
      - "每次 commit-push 完成后再开始下一项工作"
    enforcement: recommended
