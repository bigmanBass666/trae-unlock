# ============================================================
# Trae Mod Project - Cross-Session Agent Rules
# 跨会话 Agent 规则定义文件
# ============================================================
#
# 文件说明:
#   本文件定义了 Trae Mod 项目中所有 AI Agent 必须遵守的规则。
#   规则分为 5 种类型，覆盖会话生命周期中的各个阶段：
#   - RequiredReading: 新会话启动时必读文档
#   - PreActionCheck: 敏感操作前的检查条件
#   - MandatoryBehavior: 强制执行的行为规范
#   - ProhibitedBehavior: 禁止的危险操作
#   - DocumentationContract: 操作后必须更新的文档契约
#
# 使用方式:
#   每次新会话开始时，AI Agent 应按 priority 顺序加载并遵守这些规则。
#
# Schema 验证: .trae/rules/schema.json
# 最后更新: 2026-04-19
# 版本: 1.0.0
#

schema_version: "1.0.0"
project_name: "Trae Mod - Trae IDE 定制框架"
last_updated: "2026-04-19T21:41:00+08:00"
maintainer: "Trae Mod Team"

# ============================================================
# 全局配置
# ============================================================
global_config:
  # 默认执行级别，未指定 enforcement_level 的规则使用此值
  default_enforcement_level: "required"
  
  # 会话启动时的默认行为
  session_startup:
    # 是否自动加载所有 RequiredReading 规则
    auto_load_required_reading: true
    # 加载失败时的处理策略 (strict/warn/ignore)
    on_load_failure: "strict"

# ============================================================
# 规则定义列表
# ============================================================
rules:
  # ----------------------------------------------------------
  # 类型 1: RequiredReading (必读文档)
  # 用途: 新会话启动时必须按优先级读取的文档列表
  # 触发时机: 会话初始化阶段
  # ----------------------------------------------------------
  - id: "RR-001"
    type: "RequiredReading"
    priority: "critical"
    title: "项目总览文档必读"
    description: |
      新会话启动时必须首先阅读 README.md，了解项目整体情况、
      已完成成果、技术原理和目录结构。禁止在不了解项目背景的情况下直接修改代码。
    condition:
      when: "session.startup"
      trigger: "每次新会话开始"
    action:
      then: "读取并理解 README.md 的全部内容"
      steps:
        - "读取 README.md 文件"
        - "确认理解项目定位和目标"
        - "记录已完成此步骤"
    enforcement_level: "required"
    metadata:
      created_at: "2026-04-18"
      version: "1.0.0"
      author: "Trae Mod Team"
      applicable_modes: ["exploration", "modification", "testing"]
      related_files: ["README.md"]

  - id: "RR-002"
    type: "RequiredReading"
    priority: "critical"
    title: "源码架构知识库必读"
    description: |
      必须阅读 source-architecture.md 了解已有的源码探索发现，
      包括关键代码位置、模块关系、调用链、已排除的错误方向等。
      这是给所有后续 AI 看的共享知识库，避免重复探索。
    condition:
      when: "session.startup"
      trigger: "每次新会话开始，在 RR-001 之后"
    action:
      then: "读取并理解 docs/architecture/source-architecture.md"
      steps:
        - "读取 source-architecture.md"
        - "了解已有架构知识和关键位置"
        - "避免重复已完成的探索工作"
    enforcement_level: "required"
    metadata:
      created_at: "2026-04-18"
      version: "1.2.0"
      author: "Trae Mod Team"
      applicable_modes: ["exploration", "modification"]
      related_files: ["docs/architecture/source-architecture.md"]
      last_updated: "2026-04-19"

  - id: "RR-003"
    type: "RequiredReading"
    priority: "high"
    title: "当前进度文档必读"
    description: |
      必须阅读 progress.txt 了解当前项目进度、最近完成的工作、
      待解决的问题和待验证的功能。确保不会重复已完成的工作。
    condition:
      when: "session.startup"
      trigger: "每次新会话开始，在 RR-001 和 RR-002 之后"
    action:
      then: "读取 progress.txt 并记录当前进度状态"
      steps:
        - "读取 progress.txt"
        - "识别最近的进展和待办事项"
        - "确认自己的任务与当前进度一致"
    enforcement_level: "required"
    metadata:
      created_at: "2026-04-18"
      version: "1.3.0"
      author: "Trae Mod Team"
      applicable_modes: ["all"]
      related_files: ["progress.txt"]

  # ----------------------------------------------------------
  # 类型 2: PreActionCheck (操作前检查)
  # 用途: 执行敏感操作前必须满足的前置条件
  # 触发时机: 即将执行敏感操作之前
  # ----------------------------------------------------------
  - id: "PAC-001"
    type: "PreActionCheck"
    priority: "critical"
    title: "源码修改前置检查"
    description: |
      在对 Trae 源码进行任何修改之前，必须确认：
      1. 已完成所有 RequiredReading 规则
      2. 已在 source-architecture.md 中记录目标位置的现有代码
      3. 已制定补丁方案（find_original, replace_with, check_fingerprint）
      4. 确认修改不会破坏现有功能
    condition:
      when: "before_action"
      trigger: "准备修改 Trae 源码文件时"
      action_type: "source_code_modification"
    action:
      then: "执行完整的前置检查流程"
      checklist:
        - item: "已完成必读文档"
          required: true
        - item: "已在架构文档中记录目标位置"
          required: true
        - item: "已制定完整的补丁方案"
          required: true
        - item: "已评估影响范围"
          required: true
      failure_action: "停止操作，先完成缺失的前置条件"
    enforcement_level: "required"
    metadata:
      created_at: "2026-04-18"
      version: "1.1.0"
      author: "Trae Mod Team"
      applicable_modes: ["modification"]
      risk_level: "high"

  - id: "PAC-002"
    type: "PreActionCheck"
    priority: "high"
    title: "Git 提交前置检查"
    description: |
      在执行 git commit 之前，必须确认：
      1. 所有相关文档已更新（progress.txt、architecture docs 等）
      2. 提交信息符合格式要求：[类型] 简要说明
      3. 没有 sensitive data（token、密钥等）被提交
    condition:
      when: "before_action"
      trigger: "准备执行 git commit 时"
      action_type: "git_commit"
    action:
      then: "验证提交内容的完整性"
      checklist:
        - item: "文档已同步更新"
          required: true
        - item: "提交信息格式正确"
          required: true
        - item: "无敏感数据泄露风险"
          required: true
        - item: "变更范围合理"
          required: false
      failure_action: "修正问题后再提交"
    enforcement_level: "required"
    metadata:
      created_at: "2026-04-18"
      version: "1.0.0"
      author: "Trae Mod Team"
      applicable_modes: ["all"]

  - id: "PAC-003"
    type: "PreActionCheck"
    priority: "high"
    title: "新发现记录前置检查"
    description: |
      当发现新的关键代码位置、架构关系或技术细节时，
      必须在继续下一步工作之前先将发现写入共享文档。
      这是为了避免后续 AI 重复你已经做过的探索工作。
    condition:
      when: "before_action"
      trigger: "发现新的源码位置/架构信息/调用链时"
      action_type: "new_discovery"
    action:
      then: "立即将发现写入对应文档"
      target_documents:
        - "docs/architecture/source-architecture.md"  # 架构发现
        - "docs/bypass-security.md"                   # 功能实现相关
        - "progress.txt"                              # 进度摘要
      failure_action: "暂停当前工作，先完成文档更新"
    enforcement_level: "required"
    metadata:
      created_at: "2026-04-19"
      version: "1.0.0"
      author: "Trae Mod Team"
      applicable_modes: ["exploration", "modification"]
      importance_note: "⚠️ 最重要规则之一！"

  # ----------------------------------------------------------
  # 类型 3: MandatoryBehavior (强制行为)
  # 用途: 执行特定操作时必须遵循的方式
  # 触发时机: 执行特定操作过程中
  # ----------------------------------------------------------
  - id: "MB-001"
    type: "MandatoryBehavior"
    priority: "critical"
    title: "强制 Git Push 规则"
    description: |
      每次 git commit 后必须立即执行 git push！
      
      原因：本地 Git 仓库可能在 merge/rebase 操作中损坏（.git 目录消失），
      导致所有 commit 历史丢失。已有血的教训：merge 失败导致 .git 损坏。
      
      正确流程: git add . → git commit → git push（立即）
      禁止: git add . && git commit（没有 push 就做其他操作）
    condition:
      when: "during_action"
      trigger: "执行完 git commit 后"
      action_sequence: ["git.add", "git.commit"]
    action:
      then: "立即执行 git push"
      required_command: "git push"
      max_delay_seconds: 10
      prohibited_actions:
        - "commit 后不 push 就执行其他操作"
        - "批量 commit 后再一次性 push"
    enforcement_level: "required"
    metadata:
      created_at: "2026-04-18"
      version: "1.0.0"
      author: "Trae Mod Team"
      applicable_modes: ["all"]
      lesson_learned: "merge 失败导致 .git 损坏 → 所有 commit 历史丢失"

  - id: "MB-002"
    type: "MandatoryBehavior"
    priority: "high"
    title: "补丁定义标准格式"
    description: |
      所有补丁必须遵循标准的三元组格式：
      - find_original: 用于定位原始代码的唯一字符串
      - replace_with: 替换后的代码
      - check_fingerprint: 补丁应用后的唯一标识字符串（用于 verify.ps1 检测）
      
      注意：check_fingerprint 必须是替换后代码中存在的唯一字符串，
      不能使用原始代码中已存在的字符串（会导致误判为"已应用"）。
    condition:
      when: "during_action"
      trigger: "创建或修改 patches/definitions.json 中的补丁定义时"
      action_type: "patch_definition"
    action:
      then: "按标准格式编写补丁定义"
      required_fields:
        - name: "id"
          type: "string"
          description: "补丁唯一标识符"
        - name: "find_original"
          type: "string"
          description: "用于定位的原始代码片段"
        - name: "replace_with"
          type: "string"
          description: "替换后的代码"
        - name: "check_fingerprint"
          type: "string"
          description: "应用后的唯一指纹字符串"
        - name: "location"
          type: "object"
          description: "位置信息（文件路径和偏移量）"
    enforcement_level: "required"
    metadata:
      created_at: "2026-04-19"
      version: "1.1.0"
      author: "Trae Mod Team"
      applicable_modes: ["modification"]
      known_issue: "原 fingerprint 使用原代码字符串会导致误判"

  - id: "MB-003"
    type: "MandatoryBehavior"
    priority: "medium"
    title: "提交信息格式规范"
    description: |
      所有 git commit 信息必须遵循以下格式：
      [类型] 简要说明
      
      支持的类型标签：
      - [发现] 找到 xxx 在 yyy:zzzz
      - [功能] 实现了 xxx
      - [修复] 解决了 xxx 问题
      - [文档] 更新了 xxx
      - [测试] 验证了 xxx
    condition:
      when: "during_action"
      trigger: "编写 git commit message 时"
      action_type: "git_commit_message"
    action:
      then: "使用标准格式的提交信息"
      format_pattern: "^\\[(发现|功能|修复|文档|测试)\\] .+"
      examples:
        - "[发现] 找到 sandbox_execute_failure 弹窗根因在 index.js:8069700"
        - "[功能] 实现了 WHITELIST 模式沙箱绕过"
        - "[修复] 解决了 fingerprint 误判问题"
    enforcement_level: "recommended"
    metadata:
      created_at: "2026-04-18"
      version: "1.0.0"
      author: "Trae Mod Team"
      applicable_modes: ["all"]

  # ----------------------------------------------------------
  # 类型 4: ProhibitedBehavior (禁止行为)
  # 用途: 禁止执行的危险操作及替代方案
  # 触发时机: 检测到危险操作意图时
  # ----------------------------------------------------------
  - id: "PB-001"
    type: "ProhibitedBehavior"
    priority: "critical"
    title: "禁止不了解背景就改代码"
    description: |
      严禁在不阅读项目文档的情况下直接开始修改 Trae 源码。
      这会导致：重复探索、破坏已有功能、遗漏关键依赖关系。
    condition:
      when: "action_attempted"
      trigger: "尝试修改源码但未完成 RequiredReading 时"
      detection: "未检测到 RR-001/RR-002/RR-003 完成标记"
    action:
      then: "拒绝执行，引导用户先完成必读文档"
      alternative_steps:
        - "停止当前修改操作"
        - "执行 RR-001: 阅读 README.md"
        - "执行 RR-002: 阅读 source-architecture.md"
        - "执行 RR-003: 阅读 progress.txt"
        - "确认理解后再继续"
    enforcement_level: "required"
    metadata:
      created_at: "2026-04-18"
      version: "1.0.0"
      author: "Trae Mod Team"
      applicable_modes: ["all"]
      consequence: "可能导致项目损坏或重复工作"

  - id: "PB-002"
    type: "ProhibitedBehavior"
    priority: "critical"
    title: "禁止提交敏感数据"
    description: |
      严禁将任何密钥、token、密码或其他敏感信息提交到 Git 仓库。
      包括但不限于：GitHub OAuth token、API keys、数据库凭证等。
    condition:
      when: "action_attempted"
      trigger: "git add 或 git commit 包含可能的敏感文件时"
      detection_patterns:
        - "token"
        - "api_key"
        - "secret"
        - "password"
        - "credential"
        - "ghp_"
        - "gho_"
    action:
      then: "阻止提交并警告用户"
      alternative_steps:
        - "从暂存区移除敏感文件: git reset HEAD <file>"
        - "将敏感信息添加到 .gitignore"
        - "使用环境变量或密钥管理服务"
        - "如果已推送，立即撤销并轮换凭据"
    enforcement_level: "required"
    metadata:
      created_at: "2026-04-19"
      version: "1.0.0"
      author: "Trae Mod Team"
      applicable_modes: ["all"]
      security_impact: "high"

  - id: "PB-003"
    type: "ProhibitedBehavior"
    priority: "high"
    title: "禁止未同步文档就结束会话"
    description: |
      严禁在有未记录的新发现或未更新的情况下结束会话。
      所有源码探索发现必须写入 source-architecture.md，
      所有代码修改必须记录到对应文档。
    condition:
      when: "session_end"
      trigger: "会话即将结束时存在未记录的工作成果"
      detection: "有未写入文档的新发现或修改"
    action:
      then: "提醒用户完成文档更新后再结束"
      alternative_steps:
        - "列出所有未记录的发现和修改"
        - "更新 source-architecture.md（如有新发现）"
        - "更新 progress.txt（简要进度）"
        - "更新 README.md（如有重大变化）"
        - "执行 git add, commit, push"
        - "确认完成后方可结束会话"
    enforcement_level: "required"
    metadata:
      created_at: "2026-04-19"
      version: "1.0.0"
      author: "Trae Mod Team"
      applicable_modes: ["all"]
      principle: "不要让后面的 AI 重复你已经做过的探索工作！"

  - id: "PB-004"
    type: "ProhibitedBehavior"
    priority: "medium"
    title: "禁止危险的 Git 操作"
    description: |
      以下 Git 操作在本项目中被禁止或需要特别谨慎：
      - git merge / git rebase: 可能导致 .git 目录损坏
      - git push --force: 可能覆盖他人工作
      - git reset --hard: 可能丢失未提交的工作
    condition:
      when: "action_attempted"
      trigger: "尝试执行上述危险 Git 操作时"
      prohibited_commands:
        - "git merge"
        - "git rebase"
        - "git push --force"
        - "git push -f"
        - "git reset --hard"
    action:
      then: "警告用户并提供安全替代方案"
      alternatives:
        - "用 git pull 代替 merge/rebase"
        - "用正常 push 代替 force push"
        - "用 git reset --soft 或 git stash 代替 hard reset"
    enforcement_level: "required"
    metadata:
      created_at: "2026-04-19"
      version: "1.0.0"
      author: "Trae Mod Team"
      applicable_modes: ["all"]
      warning: "⚠️⚠️⚠️ 已有 .git 损坏的教训！"

  # ----------------------------------------------------------
  # 类型 5: DocumentationContract (文档更新契约)
  # 用途: 完成特定操作后必须同步更新的文档
  # 触发时机: 操作完成后
  # ----------------------------------------------------------
  - id: "DC-001"
    type: "DocumentationContract"
    priority: "critical"
    title: "源码发现文档更新契约"
    description: |
      当发现新的源码位置、架构关系、调用链、枚举值等技术信息时，
      必须更新以下文档：
    condition:
      when: "after_action"
      trigger: "完成源码探索并有新发现时"
      action_types:
        - "code_location_found"
        - "architecture_relationship_discovered"
        - "call_chain_traced"
        - "enumeration_value_identified"
    action:
      then: "更新指定的文档"
      update_targets:
        - target_file: "docs/architecture/source-architecture.md"
          required: true
          content_template: |
            ### 新发现: {发现标题}
            **时间**: {timestamp}
            **位置**: {文件名}:{偏移量}
            **内容**: {详细描述}
            **作用**: {功能说明}
            **与其他模块的关系**: {关联描述}
        - target_file: "progress.txt"
          required: true
          content_template: |
            ### 新发现: {简短描述}
            - **位置**: {文件}:{偏移量}
            - **效果**: {影响说明}
      deadline: "immediate"
    enforcement_level: "required"
    metadata:
      created_at: "2026-04-18"
      version: "1.1.0"
      author: "Trae Mod Team"
      applicable_modes: ["exploration", "modification"]
      importance: "这是给所有后续 AI 看的共享知识库"

  - id: "DC-002"
    type: "DocumentationContract"
    priority: "high"
    title: "补丁应用文档更新契约"
    description: |
      当成功应用或修改补丁后，必须更新以下文档以保持同步：
    condition:
      when: "after_action"
      trigger: "应用新补丁或修改现有补丁后"
      action_types:
        - "patch_applied"
        - "patch_modified"
        - "patch_rolled_back"
    action:
      then: "更新补丁相关文档"
      update_targets:
        - target_file: "docs/achievements/{feature_name}.md"
          required: true
          condition: "如果是新功能的首次补丁"
          content_template: |
            ## 补丁详情
            - **补丁 ID**: {patch_id}
            - **位置**: ~{offset}
            - **原始代码**: ```{original}```
            - **替换为**: ```{replacement}```
            - **指纹**: `{fingerprint}`
            - **应用时间**: {timestamp}
        - target_file: "progress.txt"
          required: true
          content_template: |
            [{位置}] {操作描述} - {效果说明}
        - target_file: "patches/definitions.json"
          required: true
          action: "同步补丁定义"
      deadline: "before_next_action"
    enforcement_level: "required"
    metadata:
      created_at: "2026-04-18"
      version: "1.0.0"
      author: "Trae Mod Team"
      applicable_modes: ["modification"]

  - id: "DC-003"
    type: "DocumentationContract"
    priority: "high"
    title: "测试结果文档更新契约"
    description: |
      当验证补丁效果或测试功能时，必须记录测试结果：
    condition:
      when: "after_action"
      trigger: "完成测试或验证后"
      action_types:
        - "test_completed"
        - "verification_done"
        - "bug_found"
        - "bug_fixed"
    action:
      then: "记录测试结果到对应文档"
      update_targets:
        - target_file: "docs/achievements/{feature_name}.md"
          required: true
          section: "## 测试记录"
          content_template: |
            ### 测试 #{test_number}
